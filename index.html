<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gym Tracker</title>
    
    <style>
        /* =========================================
           MODULE 1: STYLES
           ========================================= */
        :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --blue: #0A84FF; --gray: #8e8e93; --red: #ff453a; --green: #32d74b; --orange: #ff9f0a; }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; padding-bottom: 90px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; }
        h2 { font-size: 20px; margin: 0 0 15px 0; }
        
        .card { background-color: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        
        button { cursor: pointer; }
        button.primary { width: 100%; padding: 14px; background-color: var(--blue); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-bottom: 10px;}
        button.secondary { width: 100%; padding: 14px; background-color: #333; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-bottom: 10px;}
        button.ghost { width: 100%; padding: 10px; background-color: transparent; color: var(--blue); border: none; font-size: 16px; font-weight: bold; }
        button.danger { padding: 8px 12px; background-color: rgba(255, 69, 58, 0.2); color: var(--red); border: none; border-radius: 6px; font-size: 14px; font-weight: bold; }
        button.small-edit { padding: 8px 12px; background: #2c2c2e; color: var(--blue); border: none; border-radius: 8px; font-size: 13px; font-weight: 600; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .flex-row { display: flex; gap: 10px; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background-color: #2c2c2e; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Workout Logging Layout */
        .set-grid { display: grid; grid-template-columns: 24px 1fr 50px 50px 24px 32px 24px; gap: 6px; align-items: center; margin-bottom: 10px; text-align: center; }
        .set-grid-header { font-size: 10px; color: var(--gray); font-weight: bold; text-transform: uppercase; }
        
        .set-index { font-weight: bold; color: var(--gray); background: #333; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .set-history { font-size: 13px; color: var(--gray); line-height: 1.2; text-align: left; padding-left: 4px; }
        .set-history-date { font-size: 9px; color: #666; font-weight: normal; }
        
        .set-input { width: 100%; padding: 10px 4px; border-radius: 6px; border: none; background: #2c2c2e; color: white; font-size: 16px; text-align: center; }
        .set-input:disabled { background: transparent; color: var(--green); font-weight: bold; }
        
        .check-btn { width: 32px; height: 32px; border-radius: 6px; border: none; font-size: 16px; font-weight: bold; background: #333; color: white; margin: 0 auto;}
        .check-btn.checked { background: var(--green); color: black; }
        
        .icon-btn { background: transparent; border: none; font-size: 16px; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0 auto; }
        
        /* Clean Master Exercises Tab Styles */
        .alphabet-header { font-size: 14px; color: var(--blue); font-weight: bold; padding: 15px 5px 5px 5px; border-bottom: 1px solid #2c2c2e; margin-bottom: 10px; text-transform: uppercase; }
        .dict-item { padding: 14px 8px; border-bottom: 1px solid #1c1c1e; display: flex; flex-direction: column; gap: 10px; }
        .dict-item-name { font-size: 17px; font-weight: 600; color: #fff; }
        .dict-actions { display: flex; gap: 8px; justify-content: flex-start; }
        
        /* Button Reordering Styles */
        .template-ex-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .template-ex-item { display: flex; align-items: center; justify-content: space-between; background: #2c2c2e; padding: 10px 14px; border-radius: 12px; }
        .ex-name-label { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 10px; }
        
        /* Modals and Select layouts */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px);}
        .modal-content { width: 100%; max-width: 400px; margin-bottom: 10%; max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column; }
        
        .toggle-btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-tab { flex: 1; padding: 10px; background: #2c2c2e; border: none; border-radius: 8px; color: var(--gray); font-weight: bold; font-size: 14px; }
        .toggle-tab.active { background: var(--blue); color: white; }
        
        .scrollable-list { max-height: 200px; overflow-y: auto; background: #121212; border-radius: 8px; padding: 5px; margin-bottom: 15px; }
        .scrollable-item { padding: 12px 10px; border-bottom: 1px solid #1c1c1e; color: white; font-weight: 500; font-size: 15px; }
        .scrollable-item:active { background: #2c2c2e; }
        .scrollable-item:last-child { border-bottom: none; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 100;}
        .nav-btn { color: var(--gray); background: none; border: none; font-size: 14px; font-weight: bold; }
        .nav-btn.active { color: var(--blue); }
        .hidden { display: none !important; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="flex-between">
            <h1>Workouts</h1>
            <button class="ghost" style="width:auto;" onclick="createTemplate()">+ New</button>
        </div>
        <div id="template-list"></div>
    </div>

    <div id="workout-screen" class="hidden">
        <div class="flex-between" style="margin-bottom: 20px;">
            <button class="ghost" style="width:auto; padding:0; text-align:left; font-size:18px;" onclick="cancelWorkout()">❮ Back</button>
            <h1 id="active-workout-title" style="margin:0; text-align:center; flex:1;">Workout</h1>
            <div style="width: 60px;"></div> 
        </div>

        <div id="active-blocks"></div>
        
        <button class="ghost" onclick="openAddExModal()">+ Add Exercise</button>
        <button class="secondary" onclick="endWorkout()" style="margin-top: 20px;">Finish Workout</button>
    </div>

    <div id="exercises-screen" class="hidden">
        <h1>Exercises</h1>
        <div class="card" style="padding: 8px 16px;" id="dictionary-list"></div>
    </div>

    <div id="history-screen" class="hidden">
        <h1>All History</h1>
        <div class="card" id="history-list"></div>
    </div>

    <div id="add-ex-modal" class="modal hidden">
        <div class="modal-content card">
            <h2>Add Exercise</h2>
            
            <div class="toggle-btn-group">
                <button class="toggle-tab active" id="tab-btn-type" onclick="switchAddExMode('type')">Type Name</button>
                <button class="toggle-tab" id="tab-btn-list" onclick="switchAddExMode('list')">Show List</button>
            </div>

            <div id="mode-type-section">
                <label style="color:var(--gray); font-size:12px; font-weight:bold; margin-bottom:5px; display:block;">EXERCISE NAME</label>
                <input type="text" id="new-ex-input" list="master-ex-list" placeholder="Type exercise name...">
                <datalist id="master-ex-list"></datalist>
            </div>

            <div id="mode-list-section" class="hidden">
                <label style="color:var(--gray); font-size:12px; font-weight:bold; margin-bottom:5px; display:block;">SELECT FROM MASTER LIST</label>
                <div class="scrollable-list" id="modal-select-list"></div>
            </div>
            
            <div class="flex-row" style="margin-top:15px;">
                <button class="secondary" style="margin-bottom:0;" onclick="closeModals()">Cancel</button>
                <button class="primary" style="margin-bottom:0;" onclick="confirmAddExercise()">Add to Workout</button>
            </div>
        </div>
    </div>

    <div id="merge-modal" class="modal hidden">
        <div class="modal-content card">
            <h2>Merge Exercise</h2>
            <p style="font-size: 14px; color: var(--gray); margin-bottom: 15px;">
                Merging <strong id="merge-source-label" style="color: white;"></strong> into another exercise will update all past history and templates to the new name.
            </p>
            <label style="color:var(--gray); font-size:12px; font-weight:bold; margin-bottom:5px; display:block;">TARGET EXERCISE</label>
            <select id="merge-target-select"></select>
            
            <div class="flex-row" style="margin-top:15px;">
                <button class="secondary" style="margin-bottom:0;" onclick="closeModals()">Cancel</button>
                <button class="primary" style="margin-bottom:0; background-color: var(--orange);" onclick="confirmMerge()">Merge</button>
            </div>
        </div>
    </div>

    <div id="manage-template-modal" class="modal hidden">
        <div class="modal-content card" style="max-width:450px;">
            <h2 id="manage-template-title">Edit Template</h2>
            <p style="font-size: 13px; color: var(--gray); margin-bottom: 15px;">Tap the <b>▲</b> and <b>▼</b> arrows to reorder exercises.</p>
            
            <div id="template-ex-container" class="template-ex-list"></div>
            
            <div class="flex-row" style="margin-top:20px;">
                <button class="secondary" style="margin-bottom:0;" onclick="closeModals()">Cancel</button>
                <button class="primary" style="margin-bottom:0;" onclick="saveTemplateOrder()">Save Changes</button>
            </div>
        </div>
    </div>

    <div class="nav-bar" id="main-nav">
        <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">Home</button>
        <button class="nav-btn" id="nav-exercises" onclick="switchTab('exercises')">Exercises</button>
        <button class="nav-btn" id="nav-history" onclick="switchTab('history')">History</button>
    </div>

    <script>
        /* =========================================
           MODULE 3: DATABASE ENGINE
           ========================================= */
           
        let db = JSON.parse(localStorage.getItem('gymDB')) || { 
            sets: [], 
            templates: [
                { id: 1, name: "Push Day", exercises: ["Bench Press", "Overhead Press"] },
                { id: 2, name: "Pull Day", exercises: ["Pull-ups", "Barbell Row"] }
            ],
            dictionary: []
        };

        if (!db.dictionary || db.dictionary.length === 0) {
            let uniqueEx = new Set();
            if(db.templates) db.templates.forEach(t => t.exercises.forEach(e => uniqueEx.add(e)));
            if(db.sets) db.sets.forEach(s => uniqueEx.add(s.name));
            db.dictionary = Array.from(uniqueEx).sort();
        }

        function updateStorage() {
            db.dictionary = Array.from(new Set(db.dictionary)).sort();
            localStorage.setItem('gymDB', JSON.stringify(db));
        }

        // FORMAT FIX: Hardcoded to English ('en-US') to override device location
        function formatDisplayDate(dateStr, timestamp) {
            let d = timestamp ? new Date(timestamp) : new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr; 
            return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
        }

        function getSetHistoryData(exName, setNum) {
            const logs = db.sets.filter(s => s.name.toLowerCase() === exName.toLowerCase());
            if (logs.length === 0) return { text: "-", dateStr: "", comment: null };
            
            const lastDate = logs[0].date; 
            const specificSet = logs.find(s => s.date === lastDate && s.setNumber === setNum);
            
            if (specificSet) {
                const prettyDate = formatDisplayDate(specificSet.date, specificSet.timestamp);
                return { 
                    text: `${specificSet.weight}x${specificSet.reps}`, 
                    dateStr: prettyDate,
                    comment: specificSet.comment || null 
                };
            }
            return { text: "-", dateStr: "", comment: null };
        }

        /* =========================================
           MODULE 4: STATE MANAGEMENT & LOGIC
           ========================================= */
        
        let currentWorkout = { templateId: null, exercises: [] };
        let mergeSourceContext = ""; 
        let manageTemplateId = null; 
        let currentAddExMode = 'type'; 

        // --- TEMPLATES (REDESIGNED FOR VISIBILITY) ---
        function renderTemplates() {
            const list = document.getElementById('template-list');
            list.innerHTML = '';
            db.templates.forEach(temp => {
                const exList = temp.exercises.join(', ') || "No exercises yet";
                list.innerHTML += `
                    <div class="card" style="padding: 16px;">
                        <div class="flex-between" style="margin-bottom:5px;">
                            <h2 style="margin:0; font-size: 22px;">${temp.name}</h2>
                            <div style="display:flex; gap: 8px;">
                                <button class="small-edit" onclick="renameTemplate(${temp.id})">Rename</button>
                                <button class="small-edit" style="background:rgba(255, 69, 58, 0.2); color:var(--red);" onclick="deleteTemplate(${temp.id})">✕</button>
                            </div>
                        </div>
                        <p style="color:var(--gray); font-size:14px; margin-top:0; margin-bottom:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${exList}
                        </p>
                        <div class="flex-row">
                            <button class="primary" style="margin-bottom:0; flex:2;" onclick="startWorkout(${temp.id})">Start</button>
                            <button class="secondary" style="margin-bottom:0; flex:1;" onclick="openManageTemplate(${temp.id})">Reorder</button>
                        </div>
                    </div>
                `;
            });
        }

        function createTemplate() {
            const name = prompt("Workout Name (e.g., Leg Day):");
            if(!name) return;
            db.templates.push({ id: Date.now(), name: name, exercises: [] });
            updateStorage();
            renderTemplates();
        }

        function renameTemplate(id) {
            const temp = db.templates.find(t => t.id === id);
            const newName = prompt("Rename workout:", temp.name);
            if(newName) { 
                temp.name = newName; 
                updateStorage(); 
                renderTemplates(); 
                closeModals();
            }
        }

        function deleteTemplate(id) {
            if(confirm("Delete this workout template?")) {
                db.templates = db.templates.filter(t => t.id !== id);
                updateStorage();
                renderTemplates();
                closeModals();
            }
        }

        // --- WORKOUT ENGINE ---
        function startWorkout(templateId) {
            const template = db.templates.find(t => t.id === templateId);
            document.getElementById('active-workout-title').innerText = template.name;
            
            currentWorkout.templateId = template.id;
            currentWorkout.exercises = template.exercises.map(exName => {
                return { 
                    name: exName, 
                    sets: [ 
                        { weight: "", reps: "", comment: "", loggedId: null },
                        { weight: "", reps: "", comment: "", loggedId: null }
                    ] 
                };
            });

            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('main-nav').classList.add('hidden');
            document.getElementById('workout-screen').classList.remove('hidden');
            
            renderActiveWorkout();
        }

        function cancelWorkout() {
            if(confirm("Are you sure you want to exit? Any un-checked sets will be lost.")) {
                document.getElementById('workout-screen').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
            }
        }

        function openAddExModal() {
            const datalist = document.getElementById('master-ex-list');
            datalist.innerHTML = '';
            db.dictionary.forEach(ex => {
                datalist.innerHTML += `<option value="${ex}">`;
            });
            document.getElementById('new-ex-input').value = "";

            const listContainer = document.getElementById('modal-select-list');
            listContainer.innerHTML = '';
            if (db.dictionary.length === 0) {
                listContainer.innerHTML = '<div style="padding:15px; text-align:center; color:var(--gray);">No master exercises yet.</div>';
            } else {
                db.dictionary.forEach(ex => {
                    listContainer.innerHTML += `
                        <div class="scrollable-item" onclick="selectExerciseFromModalList('${ex.replace(/'/g, "\\'")}')">
                            ${ex}
                        </div>
                    `;
                });
            }

            switchAddExMode('type'); 
            document.getElementById('add-ex-modal').classList.remove('hidden');
        }

        function switchAddExMode(mode) {
            currentAddExMode = mode;
            if (mode === 'type') {
                document.getElementById('tab-btn-type').classList.add('active');
                document.getElementById('tab-btn-list').classList.remove('active');
                document.getElementById('mode-type-section').classList.remove('hidden');
                document.getElementById('mode-list-section').classList.add('hidden');
            } else {
                document.getElementById('tab-btn-type').classList.remove('active');
                document.getElementById('tab-btn-list').classList.add('active');
                document.getElementById('mode-type-section').classList.add('hidden');
                document.getElementById('mode-list-section').classList.remove('hidden');
            }
        }

        function selectExerciseFromModalList(name) {
            document.getElementById('new-ex-input').value = name;
            confirmAddExercise();
        }

        function closeModals() {
            document.getElementById('add-ex-modal').classList.add('hidden');
            document.getElementById('merge-modal').classList.add('hidden');
            document.getElementById('manage-template-modal').classList.add('hidden');
        }

        function confirmAddExercise() {
            const exName = document.getElementById('new-ex-input').value.trim();
            if(!exName) return alert("Please select or type an exercise name.");
            
            if (!db.dictionary.includes(exName)) db.dictionary.push(exName);

            const template = db.templates.find(t => t.id === currentWorkout.templateId);
            template.exercises.push(exName);
            updateStorage();
            
            currentWorkout.exercises.push({ 
                name: exName, 
                sets: [ 
                    { weight: "", reps: "", comment: "", loggedId: null },
                    { weight: "", reps: "", comment: "", loggedId: null }
                ] 
            });
            
            closeModals();
            renderActiveWorkout();
            renderExercisesTab(); 
        }

        function renderActiveWorkout() {
            const blocksDiv = document.getElementById('active-blocks');
            blocksDiv.innerHTML = '';

            currentWorkout.exercises.forEach((ex, exIndex) => {
                let setsHTML = '';
                
                ex.sets.forEach((set, setIndex) => {
                    const setNum = setIndex + 1;
                    const historyData = getSetHistoryData(ex.name, setNum);
                    
                    const isLogged = set.loggedId !== null;
                    const lockState = isLogged ? 'disabled' : '';
                    const checkClass = isLogged ? 'checked' : '';
                    
                    let commentColor = "var(--gray)";
                    if (set.comment) commentColor = "var(--blue)";
                    else if (historyData.comment) commentColor = "var(--orange)";
                    
                    let historyHTML = `<strong>${historyData.text}</strong>`;
                    if(historyData.dateStr) historyHTML += `<br><span class="set-history-date">${historyData.dateStr}</span>`;

                    setsHTML += `
                        <div class="set-grid">
                            <div class="set-index">${setNum}</div>
                            <div class="set-history">${historyHTML}</div>
                            <input type="number" class="set-input" placeholder="kg" id="w-${exIndex}-${setIndex}" value="${set.weight}" oninput="updateState(${exIndex}, ${setIndex}, 'weight', this.value)" ${lockState}>
                            <input type="number" class="set-input" placeholder="reps" id="r-${exIndex}-${setIndex}" value="${set.reps}" oninput="updateState(${exIndex}, ${setIndex}, 'reps', this.value)" ${lockState}>
                            
                            <button class="icon-btn" style="color: ${commentColor};" onclick="handleComment(${exIndex}, ${setIndex})">💬</button>
                            <button class="check-btn ${checkClass}" onclick="toggleSetLog(${exIndex}, ${setIndex})">✓</button>
                            <button class="icon-btn" style="color: var(--red);" onclick="removeSetRow(${exIndex}, ${setIndex})">✕</button>
                        </div>
                    `;
                });

                blocksDiv.innerHTML += `
                    <div class="card">
                        <h2>${ex.name}</h2>
                        <div class="set-grid set-grid-header">
                            <div>#</div><div style="text-align:left; padding-left:4px;">PREV</div><div>KG</div><div>REP</div><div></div><div></div><div></div>
                        </div>
                        ${setsHTML}
                        <button class="ghost" onclick="addSetRow(${exIndex})">+ Add Set</button>
                    </div>
                `;
            });
        }

        function updateState(exIndex, setIndex, field, value) {
            currentWorkout.exercises[exIndex].sets[setIndex][field] = value;
        }

        function addSetRow(exIndex) {
            currentWorkout.exercises[exIndex].sets.push({ weight: "", reps: "", comment: "", loggedId: null });
            renderActiveWorkout();
        }

        function removeSetRow(exIndex, setIndex) {
            const setObj = currentWorkout.exercises[exIndex].sets[setIndex];
            if (setObj.loggedId) {
                alert("Please uncheck (✓) the set before deleting it.");
                return;
            }
            currentWorkout.exercises[exIndex].sets.splice(setIndex, 1);
            renderActiveWorkout();
        }

        function handleComment(exIndex, setIndex) {
            const setObj = currentWorkout.exercises[exIndex].sets[setIndex];
            const setNum = setIndex + 1;
            const exName = currentWorkout.exercises[exIndex].name;
            const pastData = getSetHistoryData(exName, setNum);
            
            let promptText = "Add a comment for this set:";
            if (pastData.comment) {
                promptText = `LAST TIME (${pastData.dateStr}): "${pastData.comment}"\n\nAdd your comment for today:`;
            }
            
            const newComment = prompt(promptText, setObj.comment || "");
            if (newComment !== null) { 
                setObj.comment = newComment;
                renderActiveWorkout(); 
            }
        }

        function toggleSetLog(exIndex, setIndex) {
            const setObj = currentWorkout.exercises[exIndex].sets[setIndex];
            
            if (setObj.loggedId) {
                db.sets = db.sets.filter(s => s.id !== setObj.loggedId);
                updateStorage();
                setObj.loggedId = null;
            } else {
                const w = setObj.weight;
                const r = setObj.reps;
                if (!r) return alert("Please enter your reps.");
                
                const newId = Date.now();
                db.sets.unshift({
                    id: newId,
                    name: currentWorkout.exercises[exIndex].name,
                    weight: w || 0,
                    reps: r,
                    comment: setObj.comment || "",
                    setNumber: setIndex + 1,
                    // FORMAT FIX: English date
                    date: new Date().toLocaleDateString('en-US'),
                    timestamp: newId 
                });
                
                if (!db.dictionary.includes(currentWorkout.exercises[exIndex].name)) {
                    db.dictionary.push(currentWorkout.exercises[exIndex].name);
                }
                updateStorage();
                setObj.loggedId = newId;
            }
            renderActiveWorkout(); 
        }

        function endWorkout() {
            document.getElementById('workout-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            refreshHistoryUI(); 
            renderExercisesTab();
        }

        // --- EXERCISE DICTIONARY MANAGEMENT ---
        function renderExercisesTab() {
            const list = document.getElementById('dictionary-list');
            list.innerHTML = '';
            
            if (db.dictionary.length === 0) {
                list.innerHTML = "<p style='color:var(--gray); text-align:center;'>No exercises saved yet.</p>";
                return;
            }

            const groups = {};
            db.dictionary.forEach(ex => {
                const letter = ex.charAt(0).toUpperCase();
                if (!groups[letter]) groups[letter] = [];
                groups[letter].push(ex);
            });

            const sortedLetters = Object.keys(groups).sort();

            sortedLetters.forEach(letter => {
                list.innerHTML += `<div class="alphabet-header">${letter}</div>`;
                
                groups[letter].forEach(ex => {
                    list.innerHTML += `
                        <div class="dict-item">
                            <span class="dict-item-name">${ex}</span>
                            <div class="dict-actions">
                                <button class="small-edit" onclick="renameDictExercise('${ex.replace(/'/g, "\\'")}')">✎ Rename</button>
                                <button class="small-edit" style="color:var(--orange);" onclick="openMergeModal('${ex.replace(/'/g, "\\'")}')">⇋ Combine</button>
                                <button class="small-edit" style="color:var(--red);" onclick="deleteDictExercise('${ex.replace(/'/g, "\\'")}')">✕ Delete</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function renameDictExercise(oldName) {
            const newName = prompt(`Rename '${oldName}' to:`, oldName);
            if (!newName || newName === oldName) return;

            db.dictionary = db.dictionary.filter(e => e !== oldName);
            if (!db.dictionary.includes(newName)) db.dictionary.push(newName);

            db.sets.forEach(s => { if (s.name === oldName) s.name = newName; });

            db.templates.forEach(t => {
                const idx = t.exercises.indexOf(oldName);
                if (idx !== -1) t.exercises[idx] = newName;
            });

            updateStorage();
            renderExercisesTab();
            refreshHistoryUI();
        }

        function deleteDictExercise(exName) {
            if(confirm(`Remove '${exName}' from master list?\n\n(This removes it from auto-complete, but won't delete past history).`)) {
                db.dictionary = db.dictionary.filter(e => e !== exName);
                updateStorage();
                renderExercisesTab();
            }
        }

        function openMergeModal(sourceName) {
            mergeSourceContext = sourceName;
            document.getElementById('merge-source-label').innerText = sourceName;
            
            const select = document.getElementById('merge-target-select');
            select.innerHTML = '<option value="">-- Select target exercise --</option>';
            
            db.dictionary.forEach(ex => {
                if (ex !== sourceName) {
                    select.innerHTML += `<option value="${ex}">${ex}</option>`;
                }
            });
            
            document.getElementById('merge-modal').classList.remove('hidden');
        }

        function confirmMerge() {
            const targetName = document.getElementById('merge-target-select').value;
            if(!targetName) return alert("Please select a target exercise.");
            
            db.sets.forEach(s => { if (s.name === mergeSourceContext) s.name = targetName; });

            db.templates.forEach(t => {
                const idx = t.exercises.indexOf(mergeSourceContext);
                if (idx !== -1) {
                    if (t.exercises.includes(targetName)) {
                        t.exercises.splice(idx, 1); 
                    } else {
                        t.exercises[idx] = targetName; 
                    }
                }
            });

            db.dictionary = db.dictionary.filter(e => e !== mergeSourceContext);
            
            updateStorage();
            closeModals();
            renderExercisesTab();
            refreshHistoryUI();
            alert(`Successfully merged into ${targetName}`);
        }

        // --- MANAGE & REORDER TEMPLATE EXERCISES (BUTTONS ONLY) ---
        function openManageTemplate(templateId) {
            manageTemplateId = templateId;
            const template = db.templates.find(t => t.id === templateId);
            
            document.getElementById('manage-template-title').innerText = `Edit: ${template.name}`;
            
            const container = document.getElementById('template-ex-container');
            container.innerHTML = '';

            template.exercises.forEach((exName, index) => {
                container.innerHTML += `
                    <div class="template-ex-item" data-index="${index}">
                        <span class="ex-name-label">${exName}</span>
                        <div style="display:flex; gap: 4px; align-items:center;">
                            <button class="small-edit" style="padding: 6px 12px; background: #333; color: white;" onclick="moveTemplateExercise(${index}, -1)">▲</button>
                            <button class="small-edit" style="padding: 6px 12px; background: #333; color: white;" onclick="moveTemplateExercise(${index}, 1)">▼</button>
                            <button class="icon-btn" style="color:var(--red); font-size:18px; padding: 10px;" onclick="removeExFromTemplate(${index})">✕</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('manage-template-modal').classList.remove('hidden');
        }

        function moveTemplateExercise(index, direction) {
            const template = db.templates.find(t => t.id === manageTemplateId);
            const targetIndex = index + direction;
            
            if (targetIndex < 0 || targetIndex >= template.exercises.length) return;
            
            const temp = template.exercises[index];
            template.exercises[index] = template.exercises[targetIndex];
            template.exercises[targetIndex] = temp;
            
            updateStorage();
            openManageTemplate(manageTemplateId); 
        }

        function removeExFromTemplate(index) {
            const template = db.templates.find(t => t.id === manageTemplateId);
            template.exercises.splice(index, 1);
            openManageTemplate(manageTemplateId); 
        }

        function saveTemplateOrder() {
            const container = document.getElementById('template-ex-container');
            const items = container.querySelectorAll('.template-ex-item');
            
            const newOrder = [];
            items.forEach(item => {
                const exName = item.querySelector('.ex-name-label').innerText;
                newOrder.push(exName);
            });

            const template = db.templates.find(t => t.id === manageTemplateId);
            template.exercises = newOrder;
            updateStorage();
            closeModals();
            renderTemplates();
        }

        // --- HISTORY ---
        function refreshHistoryUI() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            db.sets.forEach(set => {
                let commentHTML = '';
                if (set.comment) {
                    commentHTML = `<div style="font-size:12px; color:var(--orange); font-style:italic; margin-top:4px;">💬 ${set.comment}</div>`;
                }
                
                const prettyDate = formatDisplayDate(set.date, set.timestamp);

                historyList.innerHTML += `
                    <div class="history-item">
                        <div>
                            <strong style="color:var(--blue);">${set.name}</strong> <span style="color:var(--gray); font-size:12px;">(Set ${set.setNumber})</span><br>
                            <span style="font-size:14px;">${set.weight}kg x ${set.reps} reps</span>
                            ${commentHTML}
                            <div style="font-size:12px; color:var(--gray); margin-top:4px;">${prettyDate}</div>
                        </div>
                        <button class="danger" onclick="deleteHistorySet(${set.id})">Delete</button>
                    </div>
                `;
            });
        }

        function deleteHistorySet(idToDelete) {
            if(confirm("Delete this set permanently?")) {
                db.sets = db.sets.filter(set => set.id !== idToDelete);
                updateStorage();
                refreshHistoryUI();
            }
        }

        // --- NAVIGATION ---
        function switchTab(tab) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('exercises-screen').classList.add('hidden');
            document.getElementById('history-screen').classList.add('hidden');
            
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-exercises').classList.remove('active');
            document.getElementById('nav-history').classList.remove('active');

            document.getElementById(`${tab}-screen`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active');
        }

        // Initialize App
        renderTemplates();
        renderExercisesTab();
        refreshHistoryUI();
    </script>
</body>
</html>
